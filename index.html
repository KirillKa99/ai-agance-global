<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Коммерческие предложения, Кирилл</title>
  <style>
    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: linear-gradient(135deg, #0a0f1f, #131d3d 55%, #1b294f);
      color: #eef3ff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
    }
    .card {
      width: 100%;
      max-width: 820px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 28px;
      padding: 36px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.35);
      backdrop-filter: blur(16px);
    }
    h1 {
      margin: 0 0 14px;
      font-size: clamp(32px, 5vw, 54px);
      line-height: 1;
      letter-spacing: -0.04em;
    }
    p {
      color: #b9c5e6;
      line-height: 1.7;
      font-size: 17px;
    }
    .links {
      display: grid;
      gap: 14px;
      margin-top: 28px;
    }
    a {
      display: block;
      padding: 18px 20px;
      color: white;
      text-decoration: none;
      border-radius: 18px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      transition: transform .2s ease, background .2s ease, border-color .2s ease;
    }
    a:hover {
      transform: translateY(-2px);
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,209,102,0.45);
    }
    .small { font-size: 14px; color: #9fb0da; margin-top: 18px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Коммерческие предложения</h1>
    <p>Публикация HTML-версий для удобного просмотра по ссылке.</p>
    <div class="links">
      <a href="./premium_raketa_v_leto.html">КП для спонсоров, Байк-фестиваль «Ракета в Лето»</a>
    </div>
    <div class="small">GitHub Pages</div>
  </div>
</body>
</html>
